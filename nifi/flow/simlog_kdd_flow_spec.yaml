# Especificación del flujo NiFi — SIMLOG España
# PG completo para este proyecto:
# 1) Ingesta GPS + OpenWeather cada 15 min
# 2) Merge de incidencias DATEX2 DGT con prioridad sobre simulacion
# 3) Publicación Kafka (dgt_raw + raw + filtered)
# 4) Persistencia HDFS y trigger de Spark para guardar en Cassandra + Hive

meta:
  process_group: PG_SIMLOG_KDD
  version: "3.0"
  scope: "standalone"
  description: >
    Grupo único de procesadores y relaciones usado en SIMLOG.
    La ingesta se ejecuta cada 15 minutos, construye un snapshot con GPS y OpenWeather,
    añade incidencias reales DATEX2 DGT, publica a Kafka y persiste en HDFS.
    El FlowFile conserva atributos de provenance (`simlog.provenance.*`) para separar
    simulacion, clima y DGT. Desde el snapshot final se lanza Spark, que persiste en
    Cassandra y Hive.

parameter_context_required:
  - KAFKA_BOOTSTRAP
  - TOPIC_RAW
  - TOPIC_DGT_RAW
  - TOPIC_FILTERED
  - OWM_API_KEY
  - DGT_DATEX2_URL
  - HDFS_BACKUP_PATH
  - PROJECT_ROOT
  - SPARK_HOME
  - SPARK_MASTER
  - DEPLOY_MODE

processors:
  # --- INGESTA ---
  - id: N01
    type: GenerateFlowFile
    name: Timer_Ingesta_15min
    scheduling_strategy: TIMER_DRIVEN
    scheduling_period: "15 min"
    run_schedule_note: "Disparo principal del pipeline KDD."
    properties:
      Batch Size: "1"
      Data Format: Text

  - id: N02
    type: UpdateAttribute
    name: Set_Parametros_Ingesta
    properties:
      owm.api.key: "${OWM_API_KEY}"
      simlog.interval.min: "15"

  - id: N03
    type: ExecuteScript
    name: Build_JSON_GPS_Sintetico
    properties:
      Script Engine: Groovy
      Script File: "${PROJECT_ROOT}/nifi/groovy/GenerateSyntheticGpsForPractice.groovy"
    output_contract:
      mime.type: application/json
      payload_keys:
        - timestamp
        - clima
        - estados_nodos
        - estados_aristas
        - camiones
      provenance_attributes:
        - simlog.provenance.sources=simulacion
        - simlog.provenance.stage=synthetic_payload

  - id: N04
    type: InvokeHTTP
    name: OpenWeather_InvokeHTTP
    properties:
      Remote URL: "${owm.url}"
      HTTP Method: GET
      Response Body Attribute Name: "owm.response"

  - id: N05
    type: ExecuteScript
    name: Merge_Weather_Into_Payload
    properties:
      Script Engine: Groovy
      Script File: "${PROJECT_ROOT}/nifi/groovy/MergeOpenWeatherIntoPayload.groovy"

  - id: N06
    type: InvokeHTTP
    name: DGT_DATEX2_InvokeHTTP
    properties:
      Remote URL: "${DGT_DATEX2_URL}"
      HTTP Method: GET
      Response Body Attribute Name: "dgt.response.xml"

  - id: N07
    type: ExecuteScript
    name: Merge_DGT_Into_Payload
    properties:
      Script Engine: Groovy
      Script File: "${PROJECT_ROOT}/nifi/groovy/MergeDgtDatex2IntoPayload.groovy"
    output_contract:
      provenance_attributes:
        - simlog.provenance.sources=simulacion,openweather,dgt
        - simlog.provenance.stage=dgt_merged
        - simlog.provenance.dgt_mode=live|disabled
        - simlog.provenance.dgt_incidents=<n>

  - id: N08
    type: PublishKafka
    name: Kafka_Publish_DGT_RAW
    properties:
      Kafka Brokers: "${KAFKA_BOOTSTRAP}"
      Topic Name: "${TOPIC_DGT_RAW}"
      Delivery Guarantee: "at_least_once"

  - id: N09
    type: PublishKafka
    name: Kafka_Publish_RAW
    properties:
      Kafka Brokers: "${KAFKA_BOOTSTRAP}"
      Topic Name: "${TOPIC_RAW}"
      Delivery Guarantee: "at_least_once"

  - id: N10
    type: PublishKafka
    name: Kafka_Publish_FILTERED
    properties:
      Kafka Brokers: "${KAFKA_BOOTSTRAP}"
      Topic Name: "${TOPIC_FILTERED}"
      Delivery Guarantee: "at_least_once"

  # --- PERSISTENCIA HDFS / TRIGGER SPARK DESDE EL SNAPSHOT FINAL ---
  # En despliegue con `scripts/recreate_nifi_practice_flow.py`: ExecuteStreamCommand + put_hdfs_from_stdin.sh
  # (backup fechado bajo nifi_raw/ y copia plana transporte_nifi_*.json para Spark).
  - id: N11
    type: ExecuteStreamCommand
    name: HDFS_Backup_JSON
    properties:
      Command Path: /bin/bash
      Command Arguments: "${PROJECT_ROOT}/nifi/scripts/put_hdfs_from_stdin.sh"
      Ignore STDIN: "false"

  - id: N12
    type: ExecuteStreamCommand
    name: Spark_Submit_Procesamiento
    properties:
      Command Path: /bin/bash
      Command Arguments: "${PROJECT_ROOT}/nifi/scripts/run_spark_from_nifi_flow.sh"
      Ignore STDIN: "true"
    note: >
      Relaciones estándar: original | output stream | nonzero status (no success/failure).
      Sin Output Destination Attribute: el FlowFile `original` lleva execution.status hacia el Route.

  - id: N12r
    type: RouteOnAttribute
    name: Route_Spark_Exito_Fallo
    properties:
      Routing Strategy: Route to Property name
      exito: "${execution.status:equals('0')}"
      fallo: "${execution.status:equals('0'):not()}"

  - id: N12b
    type: ExecuteStreamCommand
    name: Notify_Pipeline_OK
    properties:
      Command Path: /bin/bash
      Command Arguments: "${PROJECT_ROOT}/nifi/scripts/notify_pipeline_nifi_exito.sh"
      Ignore STDIN: "true"

  - id: N12c
    type: ExecuteStreamCommand
    name: Notify_Pipeline_FALLO
    properties:
      Command Path: /bin/bash
      Command Arguments: "${PROJECT_ROOT}/nifi/scripts/notify_pipeline_nifi_fallo.sh"
      Ignore STDIN: "true"

  # --- OBSERVABILIDAD / ERRORES ---
  - id: N13
    type: LogAttribute
    name: Log_Fallos
    properties:
      Log Level: error

  - id: N14
    type: PutFile
    name: DLQ_Local
    properties:
      Directory: "${PROJECT_ROOT}/logs/nifi_dlq"
      Conflict Resolution Strategy: replace

connections:
  # Ingesta
  - { from: N01, to: N02, relationship: success }
  - { from: N02, to: N03, relationship: success }
  - { from: N03, to: N04, relationship: success }
  - { from: N04, to: N05, relationship: Original }
  - { from: N05, to: N06, relationship: success }
  - { from: N06, to: N07, relationship: Original }
  - { from: N07, to: N08, relationship: success }
  - { from: N07, to: N09, relationship: success }
  - { from: N07, to: N10, relationship: success }
  - { from: N07, to: N11, relationship: success }
  - { from: N11, to: N12, relationship: original }
  - { from: N12, to: N12r, relationship: original }
  - { from: N12r, to: N12b, relationship: exito }
  - { from: N12r, to: N12c, relationship: fallo }
  - { from: N12r, to: N13, relationship: unmatched }

  # Errores comunes
  - { from: N03, to: N13, relationship: failure }
  - { from: N04, to: N13, relationship: Failure }
  - { from: N04, to: N13, relationship: Retry }
  - { from: N04, to: N13, relationship: No Retry }
  - { from: N05, to: N13, relationship: failure }
  - { from: N06, to: N13, relationship: failure }
  - { from: N06, to: N13, relationship: Failure }
  - { from: N06, to: N13, relationship: Retry }
  - { from: N06, to: N13, relationship: No Retry }
  - { from: N07, to: N13, relationship: failure }
  - { from: N11, to: N13, relationship: failure }
  - { from: N12b, to: N13, relationship: nonzero status }
  - { from: N12c, to: N13, relationship: nonzero status }
  - { from: N13, to: N14, relationship: success }

runtime_notes:
  - "El snapshot final ya contiene `source`, `severity`, `peso_pagerank`, `incidencias_dgt` y `resumen_dgt`."
  - "La provenance de NiFi puede filtrarse por `simlog.provenance.stage`, `simlog.provenance.sources` y `simlog.provenance.dgt_mode`."
  - "TOPIC_FILTERED sigue siendo el punto de integración con consumidores Spark/servicios externos."
  - "Evitar ejecutar en paralelo este trigger con Airflow para no duplicar procesamiento."
