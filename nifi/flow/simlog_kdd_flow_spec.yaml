# Especificación del flujo NiFi — SIMLOG España
# v2: flujo compacto (ingesta funcional con un ExecuteScript Groovy completo)
# v1: flujo granular (Timer + GPS + InvokeHTTP + Merge) — ver PROCESADORES_Y_RELACIONES.md

meta:
  process_group: PG_SIMLOG_KDD
  version: "2.0"
  description: >
    Ingesta KDD alineada con ingesta/ingesta_kdd.py y config.py:
    JSON → Kafka (raw + filtered) + HDFS; Spark opcional vía ExecuteProcess.

# --- v2 · RECOMENDADO (un FlowFile = un snapshot) ---
processors_v2:
  - id: V01
    type: GenerateFlowFile
    name: Timer_Ingesta_15min
    scheduling_period: "15 min"
    properties:
      Batch Size: "1"
      Data Format: Text

  - id: V02
    type: UpdateAttribute
    name: Set_OWM_Key_y_Paso
    properties:
      paso_15min: "0"
      owm.api.key: "${OWM_API_KEY}"

  - id: V03
    type: ExecuteScript
    name: Build_JSON_Ingesta_KDD
    properties:
      Script Engine: Groovy
      Script Body: "<pegar nifi/groovy/GenerateFullPayloadSimlog.groovy>"

  - id: V04
    type: PublishKafka
    name: Kafka_Topic_RAW
    properties:
      Kafka Brokers: "${KAFKA_BOOTSTRAP}"
      Topic Name: "${TOPIC_RAW}"

  - id: V05
    type: PublishKafka
    name: Kafka_Topic_FILTERED
    properties:
      Kafka Brokers: "${KAFKA_BOOTSTRAP}"
      Topic Name: "${TOPIC_FILTERED}"

  - id: V06
    type: PutHDFS
    name: HDFS_Backup_JSON
    properties:
      Hadoop Configuration Resources: "/etc/hadoop/conf/core-site.xml,/etc/hadoop/conf/hdfs-site.xml"
      Directory: "${HDFS_BACKUP_PATH}"
      Conflict Resolution: replace

  - id: V07
    type: ExecuteProcess
    name: Spark_Submit_Opcional
    enabled: false
    note: "Mismo rol que nifi/scripts/spark_submit_yarn.sh si no usas Airflow/dashboard"

connections_v2:
  - { from: V01, to: V02, relationship: success }
  - { from: V02, to: V03, relationship: success }
  - { from: V03, to: V04, relationship: success }
  - { from: V03, to: V05, relationship: success }
  - { from: V03, to: V06, relationship: success }
  - { from: V03, to: _DLQ, relationship: failure, note: "LogAttribute / PutFile opcional" }
  - { from: V06, to: V07, relationship: success, optional: true }

# --- v1 · LEGACY (granular; revisar MergeContent antes de producción) ---
processors_v1_legacy:
  - id: P01
    type: GenerateFlowFile
    name: Timer_Ingesta_15min
  - id: P02
    type: ExecuteScript
    name: Synthetic_GPS_only
    note: "nifi/groovy/GenerateSyntheticPayload.groovy — sin clima real"
  - id: P03
    type: UpdateAttribute
    name: Set_OWM_URL_Madrid
  - id: P04
    type: InvokeHTTP
    name: OpenWeather_HTTP
  - id: P05
    type: MergeContent
    name: Merge_Synthetic_and_Weather
    warning: "Debe recibir exactamente N FlowFiles por ciclo; fácil desincronizar"

notes_v1:
  - "Preferir v2 para ingesta estable."
  - "Duplicar P03+P04 para 5 hubs o usar RouteOnAttribute + fork."
  - "Tras Kafka/HDFS, Spark escribe Cassandra/Hive (no NiFi fila a fila)."
