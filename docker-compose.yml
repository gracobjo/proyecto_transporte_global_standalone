# Gemelo Digital Logístico - Stack completo: HDFS, YARN, Cassandra, NiFi, Spark, Kafka, Hive
# Uso: docker-compose up -d
# Requiere Docker Desktop en Windows 11 con suficientes recursos (recomendado: 8GB+ RAM para todos los servicios)

services:
  # ----- Hadoop (HDFS + YARN) -----
  namenode:
    image: bde2020/hadoop-namenode:2.0.0-hadoop3.2.1-java8
    container_name: namenode
    hostname: namenode
    restart: unless-stopped
    ports:
      - "9870:9870"   # Web UI
      - "9000:9000"   # RPC
    volumes:
      - hadoop_namenode:/hadoop/dfs/name
    env_file:
      - ./hadoop.env
    environment:
      - CLUSTER_NAME=logistica

  datanode:
    image: bde2020/hadoop-datanode:2.0.0-hadoop3.2.1-java8
    container_name: datanode
    hostname: datanode
    restart: unless-stopped
    volumes:
      - hadoop_datanode:/hadoop/dfs/data
    environment:
      - SERVICE_PRECONDITION=namenode:9870
    env_file:
      - ./hadoop.env

  resourcemanager:
    image: bde2020/hadoop-resourcemanager:2.0.0-hadoop3.2.1-java8
    container_name: resourcemanager
    hostname: resourcemanager
    restart: unless-stopped
    ports:
      - "8088:8088"   # YARN Web UI
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode:9864
    env_file:
      - ./hadoop.env

  nodemanager:
    image: bde2020/hadoop-nodemanager:2.0.0-hadoop3.2.1-java8
    container_name: nodemanager
    hostname: nodemanager
    restart: unless-stopped
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088
    env_file:
      - ./hadoop.env

  historyserver:
    image: bde2020/hadoop-historyserver:2.0.0-hadoop3.2.1-java8
    container_name: historyserver
    hostname: historyserver
    restart: unless-stopped
    ports:
      - "8188:8188"
    volumes:
      - hadoop_historyserver:/hadoop/yarn/timeline
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 datanode:9864 resourcemanager:8088
    env_file:
      - ./hadoop.env

  # ----- Kafka (KRaft, sin Zookeeper) - imagen oficial Apache -----
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    hostname: kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    volumes:
      - kafka_data:/var/lib/kafka/data

  # ----- Cassandra -----
  cassandra:
    image: cassandra:4.1
    container_name: cassandra
    hostname: cassandra
    restart: unless-stopped
    ports:
      - "9042:9042"
    environment:
      - CASSANDRA_CLUSTER_NAME=LogisticaCluster
      - CASSANDRA_DC=dc1
      - CASSANDRA_RACK=rack1
      - MAX_HEAP_SIZE=512M
      - HEAP_NEWSIZE=128M
    volumes:
      - cassandra_data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'describe cluster' || true"]
      interval: 15s
      timeout: 10s
      retries: 12

  # ----- Hive (metastore Postgres + HiveServer2) -----
  hive-metastore-postgresql:
    image: bde2020/hive-metastore-postgresql:2.3.0
    container_name: hive-metastore-postgresql
    hostname: hive-metastore-postgresql
    restart: unless-stopped
    environment:
      - POSTGRES_USER=hive
      - POSTGRES_PASSWORD=hive
      - POSTGRES_DB=metastore
    volumes:
      - hive_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hive"]
      interval: 10s
      timeout: 5s
      retries: 5

  hive-metastore:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-metastore
    hostname: hive-metastore
    restart: unless-stopped
    command: /opt/hive/bin/hive --service metastore
    ports:
      - "9083:9083"
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 hive-metastore-postgresql:5432
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-postgresql:5432/metastore
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionPassword=hive
    depends_on:
      namenode: { condition: service_started }
      hive-metastore-postgresql: { condition: service_healthy }

  hive-server:
    image: bde2020/hive:2.3.2-postgresql-metastore
    container_name: hive-server
    hostname: hive-server
    restart: unless-stopped
    ports:
      - "10000:10000"   # HiveServer2
    environment:
      - SERVICE_PRECONDITION=namenode:9000 namenode:9870 hive-metastore:9083
      - CORE_CONF_fs_defaultFS=hdfs://namenode:9000
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionURL=jdbc:postgresql://hive-metastore-postgresql:5432/metastore
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionDriverName=org.postgresql.Driver
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionUserName=hive
      - HIVE_CORE_CONF_javax_jdo_option_ConnectionPassword=hive
    depends_on:
      - hive-metastore

  # ----- NiFi -----
  nifi:
    image: apache/nifi:1.23.0
    container_name: nifi
    hostname: nifi
    restart: unless-stopped
    ports:
      - "8081:8080"   # NiFi UI (host 8081 para no chocar con otras apps en 8080)
    environment:
      - NIFI_WEB_HTTP_PORT=8080
      - NIFI_JVM_HEAP_INIT=256m
      - NIFI_JVM_HEAP_MAX=512m
    volumes:
      - nifi_data:/opt/nifi/nifi-current/content_repository
      - nifi_db:/opt/nifi/nifi-current/database_repository
      - nifi_flow:/opt/nifi/nifi-current/flowfile_repository

  # ----- Spark (standalone master + worker) - imagen oficial Apache -----
  spark-master:
    image: apache/spark:3.5.3
    container_name: spark-master
    hostname: spark-master
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "18080:8080"  # Master Web UI (NiFi usa 8080)
      - "7077:7077"   # Driver
    volumes:
      - spark_data:/opt/spark/work

  spark-worker:
    image: apache/spark:3.5.3
    container_name: spark-worker
    hostname: spark-worker
    restart: unless-stopped
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    environment:
      - SPARK_WORKER_MEMORY=1G
      - SPARK_WORKER_CORES=2
    depends_on:
      - spark-master

  # ----- App (Dashboard Streamlit + ingesta/procesamiento) -----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: gemelo-logistico:latest
    container_name: gemelo-app
    hostname: app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      - API_WEATHER_KEY=${API_WEATHER_KEY:-}
      - KAFKA_BOOTSTRAP=kafka:9092
      - CASSANDRA_HOST=cassandra
      - HDFS_NAMENODE=namenode:9000
      - HDFS_BACKUP_PATH=/user/hadoop/transporte_backup
      - HIVE_METASTORE_URIS=thrift://hive-metastore:9083
      - HIVE_SERVER=hive-server:10000
      - NIFI_URL=http://nifi:8080/nifi
      - SPARK_MASTER=spark://spark-master:7077
    depends_on:
      - kafka
      - cassandra
      - namenode
    # Opcional: montar CQL para inicializar keyspace (ejecutar una vez cqlsh -f)
    # volumes:
    #   - ./cassandra/esquema_logistica.cql:/opt/esquema.cql:ro

volumes:
  hadoop_namenode:
  hadoop_datanode:
  hadoop_historyserver:
  kafka_data:
  cassandra_data:
  hive_postgres_data:
  nifi_data:
  nifi_db:
  nifi_flow:
  spark_data:
