services:
  # --- Hadoop (light profile for Codespaces) ---
  namenode:
    build:
      context: .
      dockerfile: Dockerfile.codespaces
    container_name: cs-namenode
    hostname: namenode
    env_file:
      - hadoop.codespaces.env
    command:
      - /bin/bash
      - -c
      - if [ ! -d /opt/hadoop/data/nameNode/current ]; then hdfs namenode -format; fi; hdfs namenode
    ports:
      - "9870:9870" # NameNode Web UI
      - "9000:9000" # NameNode RPC
    volumes:
      - cs_namenode_data:/opt/hadoop/data/nameNode
    networks:
      - cs-bigdata-net

  datanode:
    build:
      context: .
      dockerfile: Dockerfile.codespaces
    container_name: cs-datanode
    hostname: datanode
    env_file:
      - hadoop.codespaces.env
    command: ["hdfs", "datanode"]
    depends_on:
      - namenode
    volumes:
      - cs_datanode_data:/opt/hadoop/data/dataNode
    networks:
      - cs-bigdata-net

  # --- Spark standalone ---
  spark-master:
    image: apache/spark:3.5.0
    container_name: cs-spark-master
    hostname: spark-master
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    ports:
      - "8080:8080" # Spark master UI
      - "7077:7077" # Spark master endpoint
    networks:
      - cs-bigdata-net

  spark-worker:
    image: apache/spark:3.5.0
    container_name: cs-spark-worker
    hostname: spark-worker
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "1"
      - --memory
      - "1G"
      - spark://spark-master:7077
    depends_on:
      - spark-master
    networks:
      - cs-bigdata-net

  # --- Kafka (single broker, KRaft) ---
  kafka:
    image: apache/kafka:latest
    container_name: cs-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_NODE_ID=1
      - KAFKA_PROCESS_ROLES=broker,controller
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0
    networks:
      - cs-bigdata-net

  # --- Jupyter / PySpark notebook ---
  python-env:
    image: jupyter/pyspark-notebook:latest
    container_name: cs-python-env
    hostname: python-env
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PYSPARK_PYTHON=python3
    networks:
      - cs-bigdata-net

networks:
  cs-bigdata-net:
    driver: bridge

volumes:
  cs_namenode_data:
  cs_datanode_data:
